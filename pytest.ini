[pytest]
# Add MG directory to Python path for imports
pythonpath = MG

# Only look in tests directory (prevents picking up test*.json files)
testpaths = MG/tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')

# Show verbose output
addopts = -v --tb=short
